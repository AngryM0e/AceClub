services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: "aceclubdb"
      POSTGRES_USER: "aceclubuser"
      POSTGRES_PASSWORD: "aceclubpass"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aceclubuser -d aceclubdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2g
    volumes:
      - aceclubdb-data:/var/lib/postgresql/data

volumes:
  aceclubdb-data: